<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipbook App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        /* Preloader */
        #loader { color: white; font-size: 0.9rem; letter-spacing: 2px; position: absolute; }

        /* The Book Container - Starts invisible */
        .book { 
            width: 85vw; height: 60vh; max-width: 400px; 
            position: relative; perspective: 2000px; 
            opacity: 0; transition: opacity 0.8s ease;
        }

        .page { 
            width: 100%; height: 100%; position: absolute; background: white; 
            transform-origin: left; transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 0 12px 12px 0;
            backface-visibility: hidden; user-select: none;
        }

        .page img { width: 100%; height: 100%; object-fit: contain; border-radius: 0 12px 12px 0; }
        .flipped { transform: rotateY(-170deg); z-index: 1 !important; }

        /* Nav Zones */
        .nav-zones { position: absolute; width: 100%; height: 100%; top: 0; left: 0; display: flex; z-index: 1000; pointer-events: none; }
        .zone { width: 50%; height: 100%; cursor: pointer; pointer-events: auto; -webkit-tap-highlight-color: transparent; }

        /* Index UI */
        .index-container { width: 100%; position: fixed; bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 2000; }
        .index-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; width: 90%; justify-content: center; }
        .index-dot { 
            min-width: 35px; height: 35px; background: #222; color: #666;
            border-radius: 6px; display: flex; justify-content: center; align-items: center;
            font-size: 0.8rem; cursor: pointer; border: 1px solid #333; transition: 0.3s;
        }
        .index-dot.active { background: #fff; color: #000; border-color: #fff; transform: scale(1.1); }
    </style>
</head>
<body>

<div id="loader">LOADING...</div>

<div class="book" id="flipbook">
    <div class="nav-zones">
        <div class="zone" onclick="goBack()"></div>
        <div class="zone" onclick="goForward()"></div>
    </div>

    <div class="page" style="z-index: 5;"><img src="page1.jpg?v=1.1" loading="eager"></div>
    <div class="page" style="z-index: 4;"><img src="page2.jpg?v=1.1" loading="eager"></div>
    <div class="page" style="z-index: 3;"><img src="page3.jpg?v=1.1" loading="eager"></div>
    <div class="page" style="z-index: 2;"><img src="page4.jpg?v=1.1" loading="eager"></div>
    <div class="page" style="z-index: 1;"><img src="page5.jpg?v=1.1" loading="eager"></div>
</div>

<div class="index-container">
    <div class="index-bar">
        <div class="index-dot" onclick="jumpTo(0)">1</div>
        <div class="index-dot" onclick="jumpTo(1)">2</div>
        <div class="index-dot" onclick="jumpTo(2)">3</div>
        <div class="index-dot" onclick="jumpTo(3)">4</div>
        <div class="index-dot" onclick="jumpTo(4)">5</div>
    </div>
</div>

<script>
    const pages = document.querySelectorAll('.page');
    const dots = document.querySelectorAll('.index-dot');
    const book = document.getElementById('flipbook');
    const loader = document.getElementById('loader');
    let currentIndex = 0;

    // Show book only after everything (images) is loaded
    window.onload = () => {
        loader.style.display = 'none';
        book.style.opacity = '1';
        updateActiveDot();
    };

    function updateActiveDot() {
        dots.forEach((dot, i) => {
            dot.classList.toggle('active', i === currentIndex);
        });
    }

    function goForward() {
        if (currentIndex < pages.length - 1) {
            pages[currentIndex].classList.add('flipped');
            currentIndex++;
            updateActiveDot();
        }
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            pages[currentIndex].classList.remove('flipped');
            pages[currentIndex].style.zIndex = pages.length - currentIndex;
            updateActiveDot();
        }
    }

    function jumpTo(targetIndex) {
        if (targetIndex > currentIndex) {
            while (currentIndex < targetIndex) goForward();
        } else if (targetIndex < currentIndex) {
            while (currentIndex > targetIndex) goBack();
        }
    }
</script>

</body>
</html>
