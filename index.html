<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flipbook App</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        body { background: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
        
        .book { 
            width: 85vw; height: 65vh; max-width: 400px; 
            position: relative; perspective: 2000px; 
        }

        .page { 
            width: 100%; height: 100%; position: absolute; background: #fff; 
            transform-origin: left; transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1), z-index 0.1s; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 0 12px 12px 0;
            backface-visibility: hidden; user-select: none;
            overflow: hidden;
        }

        /* Styling the placeholder images */
        .page img { width: 100%; height: 100%; object-fit: cover; }

        /* The Flip State */
        .flipped { transform: rotateY(-170deg); }

        /* Navigation Overlay */
        .nav-zones {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; display: flex; z-index: 100;
        }
        .zone { width: 50%; height: 100%; cursor: pointer; -webkit-tap-highlight-color: transparent; }

        .instruction { color: white; margin-top: 30px; opacity: 0.5; font-size: 0.7rem; letter-spacing: 2px; text-align: center; }
        .page-num { position: absolute; bottom: 10px; right: 15px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

<div class="book" id="flipbook">
    <div class="nav-zones">
        <div class="zone" onclick="goBack()" title="Back"></div>
        <div class="zone" onclick="goForward()" title="Forward"></div>
    </div>

    <div class="page" style="z-index: 5;">
        <img src="P1000017.JPG">
        <div class="page-num">Cover</div>
    </div>
    
    <div class="page" style="z-index: 4;">
        <img src="P1000054.JPG">
        <div class="page-num">Page 2</div>
    </div>

    <div class="page" style="z-index: 3;">
        <img src="P1000302.JPG">
        <div class="page-num">Page 3</div>
    </div>

    <div class="page" style="z-index: 2;">
        <img src="P1000303.JPG">
        <div class="page-num">Page 4</div>
    </div>

    <div class="page" style="z-index: 1;">
        <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?w=800&q=80">
        <div class="page-num">The End</div>
    </div>
</div>

<div class="instruction">TAP LEFT TO GO BACK <br> TAP RIGHT TO GO FORWARD</div>

<script>
    const pages = document.querySelectorAll('.page');
    let currentIndex = 0;

    function goForward() {
        if (currentIndex < pages.length - 1) {
            const page = pages[currentIndex];
            page.classList.add('flipped');
            // Wait for flip half-way point to drop z-index
            setTimeout(() => { 
                if(page.classList.contains('flipped')) page.style.zIndex = 1; 
            }, 300);
            currentIndex++;
        }
    }

    function goBack() {
        if (currentIndex > 0) {
            currentIndex--;
            const page = pages[currentIndex];
            page.classList.remove('flipped');
            // Bring back to top immediately
            page.style.zIndex = pages.length - currentIndex;
        }
    }
</script>

</body>
</html>
